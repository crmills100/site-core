# ──────────────────────────────────────────────────────────────
# Equity Work Flow — Cloudflare Worker Configuration
# Deploy with: npx wrangler deploy
# ──────────────────────────────────────────────────────────────

name            = "equityworkflow-forms"
main            = "equityworkflow-worker.js"
compatibility_date = "2024-09-23"

# ── Routes — serve the Worker on your domain ──────────────────
# Replace equityworkflow.com with your actual domain
routes = [
  { pattern = "equityworkflow.com/api/submit", zone_name = "equityworkflow.com" }
]

# ── D1 Database (optional — stores submissions as backup) ─────
# To create: npx wrangler d1 create equityworkflow-forms
# Then paste the database_id from the output below.
# Comment out this section if you don't want database storage.
[[d1_databases]]
binding      = "DB"
database_name = "equityworkflow-forms"
database_id  = "YOUR_D1_DATABASE_ID_HERE"

# ── Environment variables ──────────────────────────────────────
# DO NOT put secrets here — use: npx wrangler secret put RESEND_API_KEY
# These are non-sensitive defaults only.
[vars]
FROM_EMAIL = "Equity Work Flow <noreply@equityworkflow.com>"
TO_EMAIL   = "hello@equityworkflow.com"

# ── Secrets (set via CLI, never in this file) ─────────────────
# Run these commands once after deploying:
#   npx wrangler secret put RESEND_API_KEY
#   (paste your Resend API key when prompted)
